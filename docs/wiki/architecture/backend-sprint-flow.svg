<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">TrafficFlow Sprint 0 to Sprint 1 Backend Flow</title>
  <desc id="desc">Diagram showing how the Sprint 0 runtime foundation connects into the Sprint 1 backend skeleton and task flow.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f8fc"/>
      <stop offset="100%" stop-color="#eef3f9"/>
    </linearGradient>
    <linearGradient id="sprint0" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17324d"/>
      <stop offset="100%" stop-color="#264b6d"/>
    </linearGradient>
    <linearGradient id="sprint1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f5b47"/>
      <stop offset="100%" stop-color="#177a63"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff9f1c"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#ff6b35"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #12304a; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #4b5d72; }
      .section-title { font: 700 22px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0.4px; }
      .section-text { font: 400 18px Arial, Helvetica, sans-serif; fill: #eff6fb; }
      .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #17324d; }
      .small { font: 400 15px Arial, Helvetica, sans-serif; fill: #4b5d72; }
      .box { fill: #ffffff; stroke: #c8d3df; stroke-width: 2; rx: 18; ry: 18; }
      .box-title { font: 700 18px Arial, Helvetica, sans-serif; fill: #12304a; }
      .box-text { font: 400 15px Arial, Helvetica, sans-serif; fill: #4b5d72; }
      .arrow { fill: none; stroke: url(#flow); stroke-width: 5; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #9ab0c2; stroke-width: 3; stroke-dasharray: 10 8; }
      .pill { fill: #e9f5ef; stroke: #b9dfca; stroke-width: 1.5; rx: 999; ry: 999; }
      .pill-text { font: 700 14px Arial, Helvetica, sans-serif; fill: #177a63; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="url(#bg)"/>

  <text x="80" y="78" class="title">Sprint 0 -> Sprint 1 backend handoff</text>
  <text x="80" y="112" class="subtitle">Sprint 0 locked the reusable AI runtime. Sprint 1 wraps it with API, storage, and task orchestration.</text>

  <rect x="80" y="150" width="520" height="190" rx="22" ry="22" fill="url(#sprint0)"/>
  <text x="110" y="192" class="section-title">Sprint 0 foundation</text>
  <text x="110" y="230" class="section-text">TrafficFlowEngine.process_video(...)</text>
  <text x="110" y="260" class="section-text">progress_callback + runtime status events</text>
  <text x="110" y="290" class="section-text">VideoCountingResult.to_dict() + JSONL events</text>
  <text x="110" y="320" class="section-text">ROI-aware manual lane config contract</text>

  <rect x="1000" y="150" width="520" height="190" rx="22" ry="22" fill="url(#sprint1)"/>
  <text x="1030" y="192" class="section-title">Sprint 1 backend skeleton</text>
  <text x="1030" y="230" class="section-text">FastAPI app + route layer</text>
  <text x="1030" y="260" class="section-text">DB schema for Task, TrafficStatistic, LaneConfig</text>
  <text x="1030" y="290" class="section-text">Upload, preview-frame, task, status, result APIs</text>
  <text x="1030" y="320" class="section-text">Frontend upload and canvas drawing</text>

  <rect x="610" y="182" width="380" height="126" rx="22" ry="22" class="box"/>
  <text x="640" y="216" class="box-title">API boundary</text>
  <text x="640" y="244" class="box-text">Validate request, store upload, and create task record.</text>
  <text x="640" y="270" class="box-text">Translate runtime paths into backend URLs later.</text>

  <path d="M600 245 L610 245" class="arrow"/>
  <path d="M990 245 L1000 245" class="arrow"/>

  <rect x="130" y="400" width="260" height="96" rx="18" ry="18" class="box"/>
  <text x="156" y="436" class="box-title">1. Upload video</text>
  <text x="156" y="463" class="box-text">Frontend POSTs video to backend.</text>

  <rect x="440" y="400" width="260" height="96" rx="18" ry="18" class="box"/>
  <text x="466" y="436" class="box-title">2. Preview frame</text>
  <text x="466" y="463" class="box-text">Backend extracts a representative frame.</text>

  <rect x="750" y="400" width="260" height="96" rx="18" ry="18" class="box"/>
  <text x="776" y="436" class="box-title">3. Save task + config</text>
  <text x="776" y="463" class="box-text">Persist task row, lane config, and metadata.</text>

  <rect x="1060" y="400" width="260" height="96" rx="18" ry="18" class="box"/>
  <text x="1086" y="436" class="box-title">4. Enqueue work</text>
  <text x="1086" y="463" class="box-text">Queue or worker picks up the task.</text>

  <rect x="280" y="560" width="260" height="96" rx="18" ry="18" class="box"/>
  <text x="306" y="596" class="box-title">5. Worker executes</text>
  <text x="306" y="623" class="box-text">Worker calls TrafficFlowEngine with callbacks.</text>

  <rect x="590" y="560" width="260" height="96" rx="18" ry="18" class="box"/>
  <text x="616" y="596" class="box-title">6. Runtime returns</text>
  <text x="616" y="623" class="box-text">Counts, output paths, JSONL, progress status.</text>

  <rect x="900" y="560" width="260" height="96" rx="18" ry="18" class="box"/>
  <text x="926" y="596" class="box-title">7. Persist result</text>
  <text x="926" y="623" class="box-text">Save statistics and expose result/status.</text>

  <rect x="1210" y="560" width="260" height="96" rx="18" ry="18" class="box"/>
  <text x="1236" y="596" class="box-title">8. Frontend dashboard</text>
  <text x="1236" y="623" class="box-text">Poll status, show counts, and open outputs.</text>

  <path d="M390 448 L440 448" class="arrow"/>
  <path d="M700 448 L750 448" class="arrow"/>
  <path d="M1010 448 L1060 448" class="arrow"/>
  <path d="M1190 496 C1190 530, 440 530, 410 560" class="arrow"/>
  <path d="M540 608 L590 608" class="arrow"/>
  <path d="M850 608 L900 608" class="arrow"/>
  <path d="M1160 608 L1210 608" class="arrow"/>

  <rect x="80" y="722" width="1440" height="102" rx="18" ry="18" fill="#ffffff" stroke="#d7e1ea" stroke-width="2"/>
  <rect x="110" y="754" width="180" height="34" class="pill"/>
  <text x="132" y="777" class="pill-text">Sprint 0 output becomes Sprint 1 input</text>
  <text x="320" y="777" class="label">Engine contract:</text>
  <text x="460" y="777" class="small">progress_callback + VideoCountingResult + JSONL events</text>
  <text x="760" y="777" class="label">Backend contract:</text>
  <text x="910" y="777" class="small">store upload, task state, preview frame, and public result URLs</text>
  <text x="320" y="810" class="label">Data rule:</text>
  <text x="420" y="810" class="small">lane geometry stays in source-frame coordinates; ROI is annotation-only metadata</text>
</svg>